    <!-- Toolbar -->
    <section class="toolbar reveal">
      <div class="toolbar-left">
        <div class="search-wrap">
          <label class="sr-only" for="projectSearch">Search courses</label>
          <input
            id="projectSearch"
            type="text"
            placeholder="Search courses..."
            autocomplete="off"
          />
          <span class="search-hint">Press /</span>
        </div>
      </div>

      <div class="toolbar-right">
        <div class="segmented" role="group" aria-label="Filter projects">
          <button class="seg-btn active" data-filter="all" type="button">All</button>
          <button class="seg-btn" data-filter="physics" type="button">Physics</button>
          <button class="seg-btn" data-filter="math" type="button">Math</button>
        </div>
      </div>
    </section>

    <!-- Projects -->
    <section class="projects-section reveal" id="projects">

        </div>

        <p class="section-note">
          [Idk what to say here rn]
        </p>
      </div>

        <h4>No projects found</h4>
        <p>Try another search term or switch filters.</p>
      </div>
    </section>
