<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>BOIS VS TECH</title>
  <link rel="stylesheet" href="intro.css">
</head>
<body>
  <canvas id="introCanvas"></canvas>

  <div class="intro-ui">
    <h1 class="title">TECHFALL</h1>
    <p class="subtitle">403: VICTORY FORBIDDEN</p>

    <button onclick="startGame()">START GAME</button>

  <div class="difficulty">
    <p  class="subtitle">DIFFICULTY</p>
    <button id="difficultyButton" onclick="cycleDifficulty()">
      NOOB
    </button>
  </div>

  <div class="keybinds">
  <p class="subtitle">KEYBINDS</p>

  <button class="keybind-button" data-action="up">UP: W</button>
  <button class="keybind-button" data-action="down">DOWN: S</button>
  <button class="keybind-button" data-action="left">LEFT: A</button>
  <button class="keybind-button" data-action="right">RIGHT: D</button>
  <button class="keybind-button" data-action="heal">HEAL: H</button>
  <button class="keybind-button" data-action="time">TIME: P</button>
  <button class="keybind-button" data-action="recall">RECALL: SPACE</button>
</div>

  </div>

  <script src="js/intro.js"></script>
</body>
</html>
